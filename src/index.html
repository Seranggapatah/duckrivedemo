<html>

    <title>Rive (JS) Quick Start</title>
    <meta charset="UTF-8" />
  </head>

  <body>
    <canvas id="rive-canvas"></canvas>

    <div class="controls">
      <div class="controls-row">
        <button id="swap-head-btn" type="button" disabled>Head Swap</button>
        <button id="swap-body-back-btn" type="button" disabled>Body Back Swap</button>
        <button id="swap-body-front-btn" type="button" disabled>Body Front Swap</button>

        <button id="idle-image-btn" type="button" disabled>Weaving</button>
        <button id="celebrate-image-btn" type="button" disabled>Celebrate</button>
